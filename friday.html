<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Happy Friday!</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f0f11;
      --surface: #1a1a1f;
      --border: #2a2a30;
      --accent: #7c6af7;
      --accent-light: #a598ff;
      --text: #e8e8f0;
      --muted: #888896;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      gap: 2rem;
    }

    .header {
      text-align: center;
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      background: rgba(124, 106, 247, 0.12);
      border: 1px solid rgba(124, 106, 247, 0.3);
      color: var(--accent-light);
      padding: 0.35rem 0.9rem;
      border-radius: 99px;
      font-size: 0.8rem;
      font-weight: 500;
      letter-spacing: 0.04em;
      margin: 0 auto;
    }

    h1 {
      font-size: clamp(2rem, 5vw, 3.5rem);
      font-weight: 800;
      letter-spacing: -0.04em;
    }

    h1 span { color: var(--accent-light); }

    .subtitle {
      color: var(--muted);
      font-size: 1rem;
    }

    /* GIF CARD */
    .gif-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      overflow: hidden;
      width: 100%;
      max-width: 520px;
      aspect-ratio: 4/3;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
    }

    .gif-card img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      transition: opacity 0.3s;
    }

    .gif-card img.loading { opacity: 0; }

    .placeholder {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 0.75rem;
      color: var(--muted);
      font-size: 0.9rem;
    }

    .spinner {
      width: 36px;
      height: 36px;
      border: 3px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .placeholder.hidden { display: none; }

    /* CONTROLS */
    .controls {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1rem;
      width: 100%;
      max-width: 520px;
    }

    .btn {
      width: 100%;
      padding: 0.85rem 2rem;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 10px;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.15s;
      letter-spacing: -0.01em;
    }

    .btn:hover:not(:disabled) { opacity: 0.88; transform: translateY(-1px); }
    .btn:disabled { opacity: 0.45; cursor: not-allowed; }

    .api-note {
      font-size: 0.75rem;
      color: var(--muted);
      text-align: center;
      line-height: 1.6;
    }

    .api-note a { color: var(--accent-light); text-decoration: none; }
    .api-note a:hover { text-decoration: underline; }

    .error-msg {
      color: #f87171;
      font-size: 0.85rem;
      text-align: center;
      display: none;
    }

    .error-msg.visible { display: block; }

    /* SHARE ROW */
    .share-row {
      display: flex;
      align-items: center;
      width: 100%;
      max-width: 520px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      overflow: hidden;
      transition: border-color 0.2s;
    }
    .share-row:focus-within { border-color: var(--accent); }
    .share-url {
      flex: 1;
      padding: 0.7rem 1rem;
      font-size: 0.8rem;
      color: var(--muted);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      font-family: ui-monospace, "SF Mono", monospace;
      background: transparent;
      border: none;
      outline: none;
      cursor: text;
      user-select: all;
    }
    .copy-btn {
      flex-shrink: 0;
      padding: 0.7rem 1rem;
      background: transparent;
      border: none;
      border-left: 1px solid var(--border);
      color: var(--accent-light);
      font-size: 0.8rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s, color 0.15s;
      white-space: nowrap;
    }
    .copy-btn:hover { background: rgba(124, 106, 247, 0.1); }
    .copy-btn.copied { color: #4ade80; }
    .share-row.hidden { display: none; }

    /* GIPHY ATTRIBUTION */
    .giphy-attr {
      font-size: 0.7rem;
      color: var(--muted);
      opacity: 0.6;
    }
  </style>
</head>
<body>

  <div class="header">
    <span class="badge">&#127881; End of week update</span>
    <h1>Happy <span>Friday!</span></h1>
    <p class="subtitle">Celebrating another week well shipped.</p>
  </div>

  <div class="gif-card" id="gifCard">
    <img id="gifImg" src="" alt="Friday GIF" class="loading" />
    <div class="placeholder" id="placeholder">
      <div class="spinner"></div>
      <span>Loading your Friday vibe&hellip;</span>
    </div>
  </div>

  <div class="share-row hidden" id="shareRow">
    <input class="share-url" id="shareUrl" type="text" readonly />
    <button class="copy-btn" id="copyBtn" onclick="copyUrl()">Copy link</button>
  </div>

  <div class="controls">
    <p class="error-msg" id="errorMsg">
      Could not load a GIF. Check your API key or try again.
    </p>
    <button class="btn" id="nextBtn" onclick="loadGif()">&#127922; Give me another one</button>
    <p class="api-note">
      Powered by <a href="https://giphy.com" target="_blank" rel="noopener">GIPHY</a>.
      Replace <code>GIPHY_API_KEY</code> in the source with your free key from
      <a href="https://developers.giphy.com" target="_blank" rel="noopener">developers.giphy.com</a>.
    </p>
    <span class="giphy-attr">Powered By GIPHY</span>
  </div>

  <script>
    // ─── CONFIG ──────────────────────────────────────────────────────────────
    // Get a free API key at https://developers.giphy.com and replace below.
    const GIPHY_API_KEY = '6KhRqP6QQzAFfCr91CrXWF7UMDedaWQx';

    const SEARCH_TERMS = [
      'happy friday',
      'friday dance',
      'its friday',
      'friday vibes',
      'weekend',
    ];
    // ─────────────────────────────────────────────────────────────────────────

    const img = document.getElementById('gifImg');
    const placeholder = document.getElementById('placeholder');
    const btn = document.getElementById('nextBtn');
    const errorMsg = document.getElementById('errorMsg');
    const shareRow = document.getElementById('shareRow');
    const shareUrl = document.getElementById('shareUrl');
    const copyBtn = document.getElementById('copyBtn');

    let lastGifId = null;

    function copyUrl() {
      navigator.clipboard.writeText(shareUrl.value).then(() => {
        copyBtn.textContent = '✓ Copied!';
        copyBtn.classList.add('copied');
        setTimeout(() => {
          copyBtn.textContent = 'Copy link';
          copyBtn.classList.remove('copied');
        }, 2000);
      });
    }

    async function loadGif() {
      btn.disabled = true;
      errorMsg.classList.remove('visible');
      shareRow.classList.add('hidden');
      img.classList.add('loading');
      placeholder.classList.remove('hidden');

      const term = SEARCH_TERMS[Math.floor(Math.random() * SEARCH_TERMS.length)];
      const offset = Math.floor(Math.random() * 50);
      const url = `https://api.giphy.com/v1/gifs/search?api_key=${GIPHY_API_KEY}&q=${encodeURIComponent(term)}&limit=1&offset=${offset}&rating=g`;

      try {
        const res = await fetch(url);
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const data = await res.json();

        if (!data.data || data.data.length === 0) throw new Error('No results');

        let gif = data.data[0];
        if (gif.id === lastGifId && data.data.length > 1) gif = data.data[1];
        lastGifId = gif.id;

        const gifUrl = gif.images.original.url;
        const pageUrl = `https://giphy.com/gifs/${gif.id}`;

        img.onload = () => {
          img.classList.remove('loading');
          placeholder.classList.add('hidden');
          shareUrl.value = pageUrl;
          shareRow.classList.remove('hidden');
          btn.disabled = false;
        };
        img.src = gifUrl;
      } catch (err) {
        console.error(err);
        placeholder.classList.add('hidden');
        img.classList.remove('loading');
        errorMsg.classList.add('visible');
        btn.disabled = false;
      }
    }

    // Load on page open
    loadGif();
  </script>

</body>
</html>
